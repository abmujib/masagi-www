<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASAGI NETWORK - Under Construction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .float-animation { animation: float 3s ease-in-out infinite; }
        .bg-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body class="bg-gradient text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-3xl text-center">
        <div class="mb-8 inline-block">
            <div class="float-animation bg-blue-600 p-6 rounded-3xl shadow-2xl shadow-blue-500/20">
                <i class="fas fa-network-wired text-5xl"></i>
            </div>
        </div>

        <h1 class="text-5xl md:text-7xl font-extrabold mb-4 tracking-tight">
            MASAGI <span class="text-blue-500">NETWORK</span>
        </h1>
        
        <p class="text-xl md:text-2xl text-slate-400 mb-10 font-light">
            Kami sedang membangun infrastruktur digital yang lebih kuat untuk Anda.
        </p>

        <div class="w-full bg-slate-800 rounded-full h-4 mb-12 overflow-hidden border border-slate-700">
            <div class="bg-blue-500 h-full rounded-full transition-all duration-1000" style="width: 65%"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-sm tracking-wide uppercase font-semibold">
            <div class="p-4 border border-slate-800 rounded-xl bg-slate-900/50">
                <i class="fas fa-server mb-3 text-blue-400 text-xl"></i>
                <p>High Speed Core</p>
            </div>
            <div class="p-4 border border-slate-800 rounded-xl bg-slate-900/50">
                <i class="fas fa-shield-alt mb-3 text-blue-400 text-xl"></i>
                <p>Secure Connection</p>
            </div>
            <div class="p-4 border border-slate-800 rounded-xl bg-slate-900/50">
                <i class="fas fa-microchip mb-3 text-blue-400 text-xl"></i>
                <p>Smart Routing</p>
            </div>
        </div>

        <div class="mt-16 pt-8 border-t border-slate-800 text-slate-500">
            <p class="mb-4">Butuh bantuan segera? Hubungi tim teknis kami:</p>
            <div class="flex justify-center space-x-6 text-2xl">
                <a href="#" class="hover:text-blue-500 transition-colors"><i class="fab fa-whatsapp"></i></a>
                <a href="#" class="hover:text-blue-500 transition-colors"><i class="fas fa-envelope"></i></a>
                <a href="#" class="hover:text-blue-500 transition-colors"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>

</body>
</html>
